<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <title>O4AA Config</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <header>
    <div class="header-title">
      <strong>O4AA Config</strong>
      <span class="header-subtitle">Clipboard</span>
    </div>
    <span id="counter" class="counter">0/13</span>
  </header>

  <main id="groups"></main>

  <div id="capture-bar" class="capture-bar" style="display:none">
    <label for="capture-target">Assign to:</label>
    <select id="capture-target"></select>
    <button id="capture-btn" class="btn-capture">Capture Selection</button>
  </div>

  <footer>
    <button id="copy-btn" class="btn-primary">Copy Config JSON</button>
    <button id="clear-btn" class="btn-secondary">Clear All</button>
    <div id="status" class="status-text"></div>
  </footer>

  <script type="module" src="sidepanel.js"></script>
</body>
</html>
